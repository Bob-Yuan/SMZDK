{% extends "base.html" %}

{% block title %}发帖 - 什么值得看{% endblock %}

{% block content %}
<div class="form-page">
    <div class="form-card">
        <h1 class="form-title">发布新帖</h1>
        <form action="{{ url_for('posts.new_post') }}" method="POST">
            <div class="form-group">
                <label for="title">标题</label>
                <input type="text" id="title" name="title" placeholder="请输入帖子标题" required maxlength="200">
            </div>
            <div class="form-group">
                <label for="category">分类</label>
                <select id="category" name="category">
                    {% for cat in categories %}
                    <option value="{{ cat }}">{{ cat }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="content">内容</label>
                <textarea id="content" name="content" rows="12" placeholder="请输入帖子内容..." required></textarea>
            </div>
            <div class="form-actions">
                <a href="{{ url_for('posts.index') }}" class="btn btn-outline">取消</a>
                <button type="submit" class="btn btn-primary">发布</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
