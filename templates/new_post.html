{% extends "base.html" %}

{% block title %}分享链接 - 什么值得看{% endblock %}

{% block content %}
<div class="form-page">
    <div class="form-card">
        <h1 class="form-title">分享链接</h1>
        <form action="{{ url_for('posts.new_post') }}" method="POST">
            <div class="form-group">
                <label for="link">链接</label>
                <input type="url" id="link" name="link" placeholder="粘贴文章、视频或图片的链接" required>
            </div>
            <div class="form-group">
                <label>分类</label>
                <div class="radio-group">
                    {% for cat in categories %}
                    <label class="radio-label">
                        <input type="radio" name="category" value="{{ cat }}" {% if cat == '文章' %}checked{% endif %}>
                        <span class="radio-text">{{ cat }}</span>
                    </label>
                    {% endfor %}
                </div>
            </div>
            <div class="form-group">
                <label for="recommendation">推荐语</label>
                <textarea id="recommendation" name="recommendation" rows="4" placeholder="写几句推荐理由，让大家知道为什么值得看..."></textarea>
            </div>
            <div class="form-actions">
                <a href="{{ url_for('posts.index') }}" class="btn btn-outline">取消</a>
                <button type="submit" class="btn btn-primary">发布</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
