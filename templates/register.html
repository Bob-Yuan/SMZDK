{% extends "base.html" %}

{% block title %}注册 - 墨语论坛{% endblock %}

{% block content %}
<div class="form-page">
    <div class="form-card">
        <h1 class="form-title">注册</h1>
        <form action="{{ url_for('auth.register') }}" method="POST">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" placeholder="2-20个字符" required>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" placeholder="至少6个字符" required>
            </div>
            <div class="form-group">
                <label for="confirm_password">确认密码</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="再次输入密码" required>
            </div>
            <div class="form-actions">
                <a href="{{ url_for('auth.login') }}" class="btn btn-outline">已有账号</a>
                <button type="submit" class="btn btn-primary">注册</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
